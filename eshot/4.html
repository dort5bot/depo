<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>ESHOT Durak Sorgu</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; background: #f0f2f5; display: flex; justify-content: center; padding-top: 100px; }
        .card { background: white; padding: 25px; border-radius: 10px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); width: 350px; }
        h2 { font-size: 18px; color: #1a73e8; margin-bottom: 20px; text-align: center; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #555; }
        input[type="text"] { width: 100%; padding: 12px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box; font-size: 16px; }
        .btn { width: 100%; background: #1a73e8; color: white; border: none; padding: 12px; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 15px; }
        .btn:hover { background: #1557b0; }
    </style>
</head>
<body>

<div class="card">
    <h2>ESHOT Durak Sorgula</h2>
    
    <form id="eshotForm" action="https://www.eshot.gov.tr/tr/DuraktanGecenHatlar/299" method="post" target="_blank">
        <div class="form-group">
            <label for="durakAdi">Durak Numarasını Giriniz:</label>
            <input name="durakAdi" id="durakAdi" type="text" placeholder="Örn: 11770" required>
            
            <input id="durakId" name="durakId" type="hidden" value="">
        </div>
        
        <button type="submit" class="btn">BİLGİLERİ GETİR</button>
    </form>
</div>

<script>
    document.getElementById('eshotForm').onsubmit = function() {
        var durakNo = document.getElementById('durakAdi').value;
        
        // ESHOT sistemi hem adı hem ID'yi aynı numara olarak kabul edebiliyor
        // Formu göndermeden hemen önce durakId değerini dolduruyoruz
        document.getElementById('durakId').value = durakNo;
        
        // Formun gönderilmesine izin ver
        return true; 
    };
</script>

</body>
</html>
