<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ESHOT PRO + EXTREME EXCEL</title>
<style>
body{font-family:sans-serif;background:#f0f2f5;padding:10px}
.container{background:#fff;padding:15px;border-radius:16px;margin-bottom:12px}
button{padding:10px;border:none;border-radius:8px;background:#d32f2f;color:#fff;width:100%}
#bar{height:8px;background:green;width:0}
</style>
</head>
<body>

<div class="container">
<h2>Excel Temizleyici (Çökmez Mod)</h2>
<input type="file" id="upload" accept=".xlsx,.xls">
<button id="processBtn">Başlat</button>
<p id="status"></p>
<div style="background:#eee;border-radius:5px"><div id="bar"></div></div>
</div>

<script id="worker-code" type="javascript/worker">
importScripts('https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js');

self.onmessage = async (e) => {
  const { buffer, fileName } = e.data;

  try {
    const wb = XLSX.read(buffer, {
      type: 'array',
      cellHTML: false,
      cellFormula: false,
      cellStyles: false
    });

    const newWb = XLSX.utils.book_new();

    for (let i = 0; i < wb.SheetNames.length; i++) {
      const name = wb.SheetNames[i];
      self.postMessage({ type: 'status', msg: name, progress: Math.round((i / wb.SheetNames.length) * 80) });

      const sheet = wb.Sheets[name];

      // 🔥 PARÇALI OKUMA (chunk)
      const range = XLSX.utils.decode_range(sheet['!ref']);
      const CHUNK = 500; // satır parça boyutu

      let finalData = [];

      for (let R = range.s.r; R <= range.e.r; R += CHUNK) {
        let subRange = {
          s: { r: R, c: range.s.c },
          e: { r: Math.min(R + CHUNK, range.e.r), c: range.e.c }
        };

        let partial = XLSX.utils.sheet_to_json(sheet, {
          header: 1,
          raw: true,
          defval: "",
          range: subRange
        });

        partial = partial.filter(r => r.some(c => c !== ""));

        finalData.push(...partial);

        // RAM boşalt
        partial = null;

        self.postMessage({
          type: 'status',
          msg: name + ' (parça işleniyor)',
          progress: Math.round((R / range.e.r) * 80)
        });
      }

      const newSheet = XLSX.utils.aoa_to_sheet(finalData);
      XLSX.utils.book_append_sheet(newWb, newSheet, name);

      // RAM temizleme
      wb.Sheets[name] = null;
      finalData = null;
    }

    self.postMessage({ type: 'status', msg: 'Yazılıyor...', progress: 90 });

    const out = XLSX.write(newWb, {
      bookType: 'xlsx',
      type: 'array',
      compression: true
    });

    self.postMessage({ type: 'done', output: out, fileName: 'TEMIZ_' + fileName }, [out.buffer]);

  } catch (err) {
    self.postMessage({ type: 'error', msg: err.message });
  }
};
</script>

<script>
const btn = document.getElementById('processBtn');
const fileInput = document.getElementById('upload');
const status = document.getElementById('status');
const bar = document.getElementById('bar');

const workerBlob = new Blob([document.getElementById('worker-code').textContent]);
const worker = new Worker(URL.createObjectURL(workerBlob));

btn.onclick = async () => {
  if (!fileInput.files.length) return alert('Dosya seç');

  btn.disabled = true;
  const file = fileInput.files[0];

  status.innerText = 'Dosya okunuyor...';

  const buffer = await file.arrayBuffer();

  worker.postMessage({ buffer: buffer, fileName: file.name }, [buffer]);
};

worker.onmessage = (e) => {
  const d = e.data;

  if (d.type === 'status') {
    status.innerText = d.msg;
    if (d.progress) bar.style.width = d.progress + '%';
  }

  if (d.type === 'done') {
    bar.style.width = '100%';
    status.innerText = 'Tamamlandı';

    const blob = new Blob([d.output]);
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = d.fileName;
    a.click();

    btn.disabled = false;
  }

  if (d.type === 'error') {
    alert('Hata: ' + d.msg);
    btn.disabled = false;
  }
};
</script>

</body>
</html>
