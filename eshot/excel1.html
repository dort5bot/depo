<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Excel Temizle (Pro)</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>

<style>
.container_exc {
    display: flex;
    flex-direction: column;
    gap: 10px;
    max-width: 320px;
}

button {
    padding: 12px;
    font-weight: bold;
}

#status {
    margin-top: 10px;
}
</style>
</head>

<body>

<h2>Excel Temizleyici (Pro)</h2>

<div class="container_exc">
    <input type="file" id="upload" accept=".xlsx" />
    <button onclick="temizle()">Temizle ve İndir</button>
</div>

<p id="status"></p>

<script>
async function temizle() {

    const fileInput = document.getElementById('upload');
    const status = document.getElementById('status');
    const btn = document.querySelector("button");

    if (fileInput.files.length === 0) {
        alert("Dosya seçin!");
        return;
    }

    btn.disabled = true;
    status.innerHTML = "⏳ İşleniyor...<br>Lütfen bekleyin";
    
    // UI'nin donmaması için nefes ver
    await new Promise(r => setTimeout(r, 50));

    try {
        const file = fileInput.files[0];

        // ✅ Modern okuma
        const buffer = await file.arrayBuffer();
        const data = new Uint8Array(buffer);

        // ✅ Türkçe karakter güvenli okuma
        const oldWb = XLSX.read(data, {
            type: 'array',
            cellText: false,
            cellDates: true,
            raw: true
        });

        // 🔥 Yeni temiz workbook
        const newWb = XLSX.utils.book_new();

        let toplamHucre = 0;

        for (const sheetName of oldWb.SheetNames) {

            status.innerText = `İşleniyor: ${sheetName}`;
            await new Promise(r => setTimeout(r, 10));

            const sheet = oldWb.Sheets[sheetName];

            // ✅ SADECE HAM VERİ
            let json = XLSX.utils.sheet_to_json(sheet, {
                header: 1,
                defval: "",
                raw: true
            });

            // 🔥 BOŞ SATIR TEMİZLE (MB düşürür)
            json = json.filter(row => row.some(cell => cell !== ""));

            toplamHucre += json.length;

            const newSheet = XLSX.utils.aoa_to_sheet(json);

            XLSX.utils.book_append_sheet(newWb, newSheet, sheetName);
        }

        // ✅ EXPORT (küçültülmüş)
        const out = XLSX.write(newWb, {
            bookType: 'xlsx',
            type: 'array',
            compression: true
        });

        const blob = new Blob([out], {
            type: "application/octet-stream"
        });

        const url = URL.createObjectURL(blob);

        const a = document.createElement("a");
        a.href = url;
        a.download = "TEMIZ_" + file.name;
        a.click();

        URL.revokeObjectURL(url);

        status.innerHTML = `
            ✅ Tamamlandı<br>
            📊 Satır: ${toplamHucre}<br>
            🧹 Tüm görseller silindi
        `;

    } catch (err) {
        console.error(err);
        status.innerText = "❌ Hata oluştu!";
    } finally {
        btn.disabled = false;
    }
}
</script>

</body>
</html>
